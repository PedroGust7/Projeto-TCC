<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Cadastro do Perfil</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        input::placeholder { color: #9ca3af; font-size: 0.875rem; }
    </style>
</head>
<body class="bg-slate-50 p-4 md:p-8">

    <div class="max-w-4xl mx-auto space-y-6">
        
        <header class="flex justify-between items-center border-b pb-4">
            <h1 class="text-sm font-bold text-slate-800 uppercase tracking-wider">Novo Cadastro do Perfil</h1>
            <div class="flex gap-1">
                <div class="h-1.5 w-8 bg-orange-500 rounded-full"></div>
                <div class="h-1.5 w-8 bg-slate-200 rounded-full"></div>
            </div>
        </header>

        <form class="space-y-6">
            
            <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <div class="flex flex-col md:flex-row gap-6 items-center">
                    <div class="w-32 h-32 border-2 border-dashed border-slate-200 rounded-lg flex flex-col items-center justify-center text-slate-400 gap-2 cursor-pointer hover:bg-slate-50">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z" />
                        </svg>
                        <span class="text-[10px] font-bold uppercase">Adicionar Foto</span>
                    </div>

                    <div class="flex-1 w-full">
                        <label class="text-[10px] font-bold text-slate-500 uppercase mb-3 block text-center md:text-left">Tipo de Utilizador</label>
                        <div class="grid grid-cols-3 gap-3">
                            <button type="button" class="flex flex-col items-center justify-center p-4 rounded-xl border-2 border-indigo-600 bg-indigo-50 text-indigo-700 transition-all">
                                <span class="text-xl mb-1">⚕️</span>
                                <span class="text-xs font-bold uppercase">Médico</span>
                            </button>
                            <button type="button" class="flex flex-col items-center justify-center p-4 rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-50 transition-all">
                                <span class="text-xl mb-1">🏃‍♂️</span>
                                <span class="text-xs font-bold uppercase">Atleta</span>
                            </button>
                            <button type="button" class="flex flex-col items-center justify-center p-4 rounded-xl border border-slate-200 text-slate-600 hover:bg-slate-50 transition-all">
                                <span class="text-xl mb-1">📋</span>
                                <span class="text-xs font-bold uppercase">Treinador</span>
                            </button>
                        </div>
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h2 class="text-sm font-bold text-indigo-600 flex items-center gap-2 mb-4 uppercase italic">
                    <span>👥</span> Dados Pessoais
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                    <div class="md:col-span-3">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Nome Completo</label>
                        <input type="text" placeholder="Insira o nome completo" class="w-full mt-1 p-2 border border-slate-200 rounded-md focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Data de Nascimento</label>
                        <input type="date" class="w-full mt-1 p-2 border border-slate-200 rounded-md focus:ring-2 focus:ring-indigo-500 outline-none text-slate-500">
                    </div>
                    <div class="md:col-span-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">CPF</label>
                        <input type="text" placeholder="000.000.000-00" class="w-full mt-1 p-2 border border-slate-200 rounded-md outline-none">
                    </div>
                    <div class="md:col-span-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">RG</label>
                        <input type="text" placeholder="00.000.000-0" class="w-full mt-1 p-2 border border-slate-200 rounded-md outline-none">
                    </div>
                    <div class="md:col-span-2">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Sexo</label>
                        <select class="w-full mt-1 p-2 border border-slate-200 rounded-md outline-none bg-white text-slate-500">
                            <option>Selecione...</option>
                        </select>
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h2 class="text-sm font-bold text-indigo-600 flex items-center gap-2 mb-4 uppercase italic">
                    <span>📍</span> Endereço
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-6 gap-4">
                    <div class="md:col-span-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">CEP</label>
                        <input type="text" placeholder="00000-000" class="w-full mt-1 p-2 border border-slate-200 rounded-md outline-none">
                    </div>
                    <div class="md:col-span-4">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Rua / Avenida</label>
                        <input type="text" placeholder="Nome da rua" class="w-full mt-1 p-2 border border-slate-200 rounded-md outline-none">
                    </div>
                    <div class="md:col-span-1">
                        <label class="text-[10px] font-bold text-slate-400 uppercase">Número</label>
                        <input type="text" placeholder="Ex: 123" class="w-full mt-1 p-2 border border-slate-200 rounded-md outline-none">
                    </div>
                </div>
            </section>

            <section class="bg-white p-6 rounded-xl shadow-sm border border-slate-100">
                <h2 class="text-sm font-bold text-indigo-600 flex items-center gap-2 mb-6 uppercase italic">
                    <span>❤️</span> Filiação
                </h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <h3 class="text-[10px] font-bold text-indigo-600 border-b-2 border-indigo-600 inline-block uppercase">Dados da Mãe</h3>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase">Nome da Mãe</label>
                            <input type="text" placeholder="Nome completo da mãe" class="w-full mt-1 p-2 border border-slate-200 rounded-md outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase">E-mail</label>
                            <input type="email" placeholder="mae@email.com" class="w-full mt-1 p-2 border border-slate-200 rounded-md outline-none">
                        </div>
                    </div>
                    <div class="space-y-4">
                        <h3 class="text-[10px] font-bold text-indigo-600 border-b-2 border-indigo-600 inline-block uppercase">Dados do Pai</h3>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase">Nome do Pai</label>
                            <input type="text" placeholder="Nome completo do pai" class="w-full mt-1 p-2 border border-slate-200 rounded-md outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-slate-400 uppercase">E-mail</label>
                            <input type="email" placeholder="pai@email.com" class="w-full mt-1 p-2 border border-slate-200 rounded-md outline-none">
                        </div>
                    </div>
                </div>
            </section>

            <div class="flex flex-col md:flex-row justify-between items-center gap-4 pt-4">
                <button type="reset" class="text-[10px] font-bold text-slate-400 uppercase hover:text-slate-600 transition-colors">Limpar Campos</button>
                <button type="submit" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 px-12 rounded-lg shadow-md transition-all uppercase text-sm tracking-widest">
                    Finalizar Cadastro
                </button>
            </div>

        </form>
    </div>

</body>
</html>
